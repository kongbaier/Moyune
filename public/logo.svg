<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#2d2d2d" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b4513" />
      <stop offset="100%" stop-color="#a0522d" />
    </linearGradient>
    <filter id="inkBleed" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="0.5" result="blurred" />
      <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="SourceGraphic" opacity="0.85" />
      </feMerge>
    </filter>
  </defs>

  <!-- outer circle / seal impression -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#inkGrad)" stroke-width="4" opacity="0.12" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#inkGrad)" stroke-width="1.5" opacity="0.08" />

  <!-- open book: left page -->
  <g filter="url(#inkBleed)">
    <path d="M256 130
             C256 130 180 100 120 150
             C110 155 105 170 110 190
             L130 380
             C135 400 150 405 160 400
             C210 380 250 390 256 400"
          fill="url(#inkGrad)" opacity="0.9" />

    <!-- open book: right page -->
    <path d="M256 130
             C256 130 332 100 392 150
             C402 155 407 170 402 190
             L382 380
             C377 400 362 405 352 400
             C302 380 262 390 256 400"
          fill="url(#inkGrad)" opacity="0.72" />

    <!-- center spine shadow -->
    <path d="M252 128 L252 402 L260 402 L260 128 Z"
          fill="#1a1a1a" opacity="0.15" />
  </g>

  <!-- spine line -->
  <line x1="256" y1="132" x2="256" y2="398" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5" />

  <!-- ink drop accent -->
  <g filter="url(#inkBleed)" transform="translate(170, 460)">
    <path d="M12 0
             C12 0 -4 18 -4 28
             C-4 36.8 3.2 44 12 44
             C20.8 44 28 36.8 28 28
             C28 18 12 0 12 0 Z"
          fill="url(#accentGrad)" opacity="0.85" />
  </g>

  <!-- small ink splatter dots -->
  <circle cx="158" cy="468" r="3" fill="#a0522d" opacity="0.4" />
  <circle cx="182" cy="474" r="2" fill="#8b4513" opacity="0.3" />
  <circle cx="165" cy="480" r="1.5" fill="#a0522d" opacity="0.35" />

  <!-- character hint: stylized 墨 in negative space of pages -->
  <!-- top horizontal stroke (𠃍) -->
  <path d="M180 200 L220 200 L220 240 L200 240"
        stroke="#fff" stroke-width="3" fill="none" opacity="0.6" />
  <!-- vertical stroke -->
  <line x1="200" y1="195" x2="200" y2="360" stroke="#fff" stroke-width="2" opacity="0.4" />
  <!-- lower horizontal strokes -->
  <line x1="180" y1="290" x2="220" y2="290" stroke="#fff" stroke-width="2" opacity="0.5" />
  <line x1="180" y1="320" x2="220" y2="320" stroke="#fff" stroke-width="2" opacity="0.5" />
  <line x1="185" y1="350" x2="215" y2="350" stroke="#fff" stroke-width="2" opacity="0.45" />
  <!-- four dots (灬 radical simplified) -->
  <circle cx="185" cy="370" r="2" fill="#fff" opacity="0.45" />
  <circle cx="198" cy="370" r="2" fill="#fff" opacity="0.45" />
  <circle cx="211" cy="370" r="2" fill="#fff" opacity="0.45" />
  <circle cx="200" cy="370" r="2" fill="#fff" opacity="0.45" />

  <!-- character hint: stylized 墨 in right page (simpler, mirrored feel) -->
  <path d="M292 200 L332 200 L332 240 L312 240"
        stroke="#fff" stroke-width="2.5" fill="none" opacity="0.35" />
  <line x1="312" y1="195" x2="312" y2="360" stroke="#fff" stroke-width="1.5" opacity="0.25" />
  <line x1="292" y1="290" x2="332" y2="290" stroke="#fff" stroke-width="1.5" opacity="0.3" />
  <line x1="292" y1="320" x2="332" y2="320" stroke="#fff" stroke-width="1.5" opacity="0.3" />
  <line x1="297" y1="350" x2="327" y2="350" stroke="#fff" stroke-width="1.5" opacity="0.25" />
  <circle cx="296" cy="370" r="1.5" fill="#fff" opacity="0.25" />
  <circle cx="309" cy="370" r="1.5" fill="#fff" opacity="0.25" />
  <circle cx="322" cy="370" r="1.5" fill="#fff" opacity="0.25" />
  <circle cx="312" cy="370" r="1.5" fill="#fff" opacity="0.25" />
</svg>
